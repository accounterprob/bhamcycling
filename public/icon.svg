<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161922"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>
  </defs>
  <!-- Filled background; iOS will round the corners itself, Android/manifest also tolerates square -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Bicycle in cyan accent -->
  <g fill="none" stroke="#38d1ff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <!-- wheels -->
    <circle cx="148" cy="346" r="78"/>
    <circle cx="364" cy="346" r="78"/>
    <!-- frame -->
    <path d="M 148 346 L 232 220 L 332 220 L 364 346"/>
    <path d="M 232 220 L 248 346"/>
    <!-- seat post + seat -->
    <path d="M 248 346 L 232 200"/>
    <path d="M 210 196 L 254 196"/>
    <!-- handlebar stem -->
    <path d="M 332 220 L 354 188"/>
    <path d="M 338 186 L 372 192"/>
    <!-- crank / pedal hint -->
    <circle cx="248" cy="346" r="14" fill="#38d1ff"/>
  </g>
</svg>
